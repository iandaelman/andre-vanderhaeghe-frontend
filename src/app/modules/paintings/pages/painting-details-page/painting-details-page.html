@if (painting(); as p) {
  <app-header />
  <div class="detail-container">
    <div class="image-container">
      <img [src]="p.imageUrl" alt="{{ p.titleNL }}" />
    </div>
    <mat-accordion displayMode="flat" [multi]="false" [hideToggle]="false">
      <mat-expansion-panel [hideToggle]="false">
        <mat-expansion-panel-header>Titel</mat-expansion-panel-header>
        <p>{{ p.titleNL }}</p>
      </mat-expansion-panel>
      <mat-expansion-panel [hideToggle]="false">
        <mat-expansion-panel-header>Periode</mat-expansion-panel-header>
        <p>{{ p.category }}</p>
      </mat-expansion-panel>
      <mat-expansion-panel [hideToggle]="false">
        <mat-expansion-panel-header>Afmetingen</mat-expansion-panel-header>
        <p>Lengte: {{ p.length }}cm</p>
        <p>Breedte: {{ p.width }}cm</p>
      </mat-expansion-panel>
    </mat-accordion>
  </div>
} @else {
  <div class="loading-container">Gallerij laden...</div>
}
