<div class="homepage-container">
  <div class="content-wrapper">
    <!-- Central image -->
    <div class="image-section">
      <img src="assets/images/logo/AV_logo.jpg" alt="André Vanderhaeghe" class="portrait" />
      <p class="subtitle">Een magisch surrealist</p>
    </div>

    <!-- Navigation links -->
    <nav class="navigation">
      @for (link of navigationLinks; track link.label) {
        <a [routerLink]="link.route" class="nav-link">
          {{ link.label }}
        </a>
      }
    </nav>
  </div>
</div>
